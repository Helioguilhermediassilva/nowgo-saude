# Pre-commit hooks for the NowGo Saude monorepo.
# Run: pre-commit install (from repo root)
default_language_version:
  python: python3.13
  node: "22.15.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --config=backend/pyproject.toml]
        files: ^(backend|workers)/.*\.py$
      - id: ruff-format
        args: [--config=backend/pyproject.toml]
        files: ^(backend|workers)/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.0.0
    hooks:
      - id: mypy
        name: mypy (backend)
        files: ^backend/src/.*\.py$
        args: [--config-file=backend/pyproject.toml]
        additional_dependencies:
          - pydantic>=2
          - sqlalchemy>=2
          - types-python-jose

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|md|css)$
        additional_dependencies:
          - prettier@3.6.2
          - prettier-plugin-tailwindcss@0.6.13

  - repo: local
    hooks:
      - id: forbid-egress-bypass
        name: Forbid bypass of egress_guard
        entry: "egress_guard\\s*=\\s*None|disable_egress_guard"
        language: pygrep
        types: [python]
        exclude: ^backend/tests/
