name: nowgo-saude-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nowgo-postgres
    environment:
      POSTGRES_USER: nowgo
      POSTGRES_PASSWORD: nowgo_dev
      POSTGRES_DB: nowgo_saude
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nowgo -d nowgo_saude"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nowgo-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: nowgo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nowgo
      MINIO_ROOT_PASSWORD: nowgo_dev_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.118.0
    container_name: nowgo-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ../otel/collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: nowgo-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"

volumes:
  postgres-data:
  redis-data:
  minio-data:
